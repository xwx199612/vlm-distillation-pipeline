seed: 42

options:
  task_name: parsing
  quality: 480p
  teacher_quantization: 8bit
  student_quantization: 4bit
  # Derived automatically:
  # label_profile = {quality}_{teacher_quantization}
  # response_profile = {quality}_{teacher_quantization}_student_{student_quantization}

data:
  manifest_path: outputs/switch-kd/{task_name}_manifest.jsonl
  distill_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}.jsonl
  label_path: outputs/switch-kd/{task_name}_teacher_labels_{label_profile}.jsonl
  teacher_logits_path: outputs/switch-kd/{task_name}_teacher_logits_{label_profile}.jsonl
  switch_logits_path: outputs/switch-kd/{task_name}_switch_logits_{response_profile}.jsonl
  eval_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}.jsonl
  image_dir: /home/phison/vlm_distill/TV_data
  image_root: .
  max_samples:

teacher:
  backend: hf
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: float16
  quantization: "{teacher_quantization}"
  temperature: 0.0
  max_new_tokens: 512
  image_resize: "{quality}"

student:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  output_dir: outputs/switch-kd/{task_name}_switch_kd_{response_profile}
  adapter_dir: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/adapter
  use_lora: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  quantization: "{student_quantization}"

training:
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0001
  warmup_ratio: 0.03
  max_steps:
  log_every: 50
  save_every: 1000
  mixed_precision: bf16           # 伺服器 GPU 支援 bf16 時 否則為 fp16
  gradient_checkpointing: false   # 只有 VRAM 夠時才關
  image_resize: "{quality}"
  max_length: 4096
  freeze_vision_tower: true
  mask_prompt_labels: true


distillation:
  prompt_template: |
    You are an Android TV GUI parsing assistant.

    Task:
    {query}

    Identify all visible interactive UI elements in this screenshot.

    Interactive elements include:
    - tabs
    - buttons
    - app icons
    - app tiles
    - menu items
    - carousel tiles
    - focused or highlighted items
    - toggles
    - search or text inputs
    - clickable text links
    - settings, account, search, or navigation icons

    Exclude:
    - movie descriptions
    - recommendation summaries
    - long informational text
    - advertisements
    - decorative or non-interactive text

    Rules:
    - Prefer recall over brevity.
    - Do not return only the top navigation bar.
    - Include every visible app icon, tile, card, tab, and focused item.
    - If there are multiple rows or carousels, inspect all visible rows.
    - Mark the focused or highlighted element if visible.
    - If the text is unreadable but the element is clearly interactive, use a short visual name.
    - Each element must be an object with text, type, and focused.

    Return raw JSON only.
    Do not explain.
    Do not use markdown.

    Use this schema:
    {{
      "elements": [
        {{
          "text": "...",
          "type": "tab|button|app_icon|app_tile|menu_item|tile|toggle|input|icon|link|other",
          "focused": true
        }}
      ]
    }}
  lm_loss_weight: 1.0
  dbild_loss_weight: 0.5
  vsd_loss_weight: 0.5
  kd_temperature: 2.0
  dbild_top_k: 64
  dbild_min_prob: 0.0
  teacher_logits_field: teacher_logits
  switch_logits_field: switch_logits
  use_cached_logits: true
  student_vision_path: model.visual
  student_projector_path: "__identity__"
  teacher_lm_path: model.language_model
  teacher_token_embedding_path: model.language_model.embed_tokens
  teacher_lm_head_path: lm_head
  switch_cache_student_visual: true
  student_visual_cache_dir: outputs/switch-kd/student_visual_cache
  keep_student_visual_cache_on_cpu: true
  visual_token_placeholder: "<|image_pad|>"
  max_cached_logits_vocab: 4096
  align_kd_logits_to_answer: true
  skip_kd_on_vocab_mismatch: true

evaluation:
  output_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/eval_report.json
  metrics:
    - exact_match
    - token_f1
