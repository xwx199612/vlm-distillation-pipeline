seed: 42

data:
  manifest_path: data/manifest.jsonl
  distill_path: outputs/distill_dataset.jsonl
  eval_path: data/eval.jsonl
  image_root: .
  max_samples:

teacher:
  backend: hf
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: bfloat16
  temperature: 0.2
  max_new_tokens: 128
  image_resize: original

student:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  output_dir: outputs/student
  adapter_dir: outputs/student/adapter
  use_lora: true
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  quantization: 4bit

training:
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  warmup_ratio: 0.03
  max_steps:
  log_every: 10
  save_every: 500
  mixed_precision: bf16
  image_resize: original

distillation:
  switch_kd:
    enabled: true
    visual_switch:
      mode: paper
      teacher_projector: native
      allow_fallback_adapter: false

distillation:
  confidence_weighting: true
  min_teacher_confidence: 0.35
  prompt_template: "query: {query}\nAnswer:"

evaluation:
  output_path: outputs/eval_report.json
  metrics:
    - exact_match
    - token_f1
