seed: 42

data:
  manifest_path: data/manifest.jsonl
  distill_path: outputs/switch_kd_dataset.jsonl
  eval_path: outputs/switch_kd_dataset.jsonl
  image_root: .
  max_samples:

teacher:
  backend: hf
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: float16
  quantization: 8bit
  temperature: 0.0
  max_new_tokens: 256
  image_resize: original

student:
  # 4060 Ti 16GB 可直接嘗試 2B-3B 級別 student；若想更穩定再往下調。
  model_name: HuggingFaceTB/SmolVLM2-2.2B-Instruct
  output_dir: outputs/student_switch_kd
  adapter_dir: outputs/student_switch_kd/adapter
  use_lora: true
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  quantization: 8bit

training:
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  warmup_ratio: 0.03
  max_steps:
  log_every: 10
  save_every: 250
  mixed_precision: fp16
  gradient_checkpointing: true
  image_resize: original
  max_length: 384
  freeze_vision_tower: true
  mask_prompt_labels: true

distillation:
  method: switch_kd
  confidence_weighting: true
  min_teacher_confidence: 0.35
  prompt_template: "query: {query}\nAnswer:"
  lm_loss_weight: 1.0
  dbild_loss_weight: 0.5
  vsd_loss_weight: 0.5
  kd_temperature: 2.0
  dbild_top_k: 64
  dbild_min_prob: 0.0
  teacher_logits_field: teacher_logits
  switch_logits_field: switch_logits
  use_cached_logits: true
  # SmolVLM2-2.2B (student) + Qwen2.5-VL-7B (teacher) 的常見 component path。
  # 若換模型，請用 model.named_modules() 確認後再改。
  student_vision_path: model.vision_model
  teacher_lm_path: language_model
  teacher_token_embedding_path: get_input_embeddings
  teacher_lm_head_path: lm_head
  # Qwen2.5-VL processor 常用影像 placeholder；SmolVLM 會 fallback 到前置拼接。
  visual_token_placeholder: "<|image_pad|>"
  # 4060 Ti 16GB 可用更大的 top-k cache；8k 是較平衡的預設。
  max_cached_logits_vocab: 8192
  align_kd_logits_to_answer: true
  # Qwen teacher 與 SmolVLM student 詞表不同時，DBiLD/VSD 會自動跳過，只保留 LM loss。
  skip_kd_on_vocab_mismatch: true
  switch_kd:
    enabled: true
    visual_switch:
      mode: adapter_to_teacher_projector
      teacher_projector: native
      allow_fallback_adapter: true
      adapter_path: model.connector

evaluation:
  output_path: outputs/switch_kd_eval_report.json
  metrics:
    - exact_match
    - token_f1
