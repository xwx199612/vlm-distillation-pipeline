seed: 42
options:
  task_name: parsing
  quality: 480p
  teacher_quantization: 8bit
  student_quantization: 4bit
data:
  manifest_path: outputs/switch-kd/shards/parsing_manifest_shard3.jsonl
  distill_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}.jsonl
  label_path: outputs/switch-kd/shards/parsing_teacher_labels_shard3.jsonl
  switch_logits_path: outputs/switch-kd/{task_name}_switch_logits_{response_profile}.jsonl
  eval_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}.jsonl
  image_dir: /home/phison/vlm_distill/TV_data
  image_root: .
  max_samples: null
teacher:
  backend: hf
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: float16
  quantization: '{teacher_quantization}'
  temperature: 0.0
  max_new_tokens: 512
  image_resize: '{quality}'
student:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  output_dir: outputs/switch-kd/{task_name}_switch_kd_{response_profile}
  adapter_dir: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/adapter
  device_map: auto
  use_lora: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  quantization: '{student_quantization}'
training:
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0001
  warmup_ratio: 0.03
  max_steps: null
  log_every: 50
  save_every: 1000
  mixed_precision: bf16
  gradient_checkpointing: false
  image_resize: '{quality}'
  max_length: 4096
  freeze_vision_tower: true
  mask_prompt_labels: true
distillation:
  method: switch_kd
  teacher_logits: true
  confidence_weighting: true
  min_teacher_confidence: 0.35
  prompt_template: "You are an Android TV GUI parsing assistant.\n\nTask:\n{query}\n\
    \nIdentify all visible interactive UI elements in this screenshot.\n\nInteractive\
    \ elements include:\n\n* tabs\n* buttons\n* app icons\n* app tiles\n* menu items\n* carousel tiles\n* focused or highlighted items\n* toggles or switches\n* search boxes or text inputs\n* clickable text links\n* settings, account, search, or navigation icons\n\nExclude:\n\n* movie descriptions\n* recommendation summaries\n* long informational text\n* advertisements\n* decorative or non-interactive text\n\nRules:\n\n* Prefer recall over brevity.\n* Do not return only the top navigation bar.\n* Include every visible app icon, tile, card, tab, button, menu item, and focused item.\n* If there are multiple rows or carousels, inspect all visible rows.\n* Mark the focused or highlighted element with \"focused\": true.\n* Use \"focused\": false for all other elements.\n* If the text is unreadable but the element is clearly interactive, use a short visual name.\n* Each element must be an object with exactly these fields: \"text\", \"type\", and \"focused\".\n\nThe \"type\" field is a closed enum.\nFor every element, \"type\" MUST be exactly one of:\n[\"tab\", \"button\", \"app_icon\", \"app_tile\", \"menu_item\", \"tile\", \"toggle\", \"input\", \"icon\", \"link\", \"other\", \"unknown\"]\n\nDo not invent new type names.\nDo not output values such as:\n\"card\", \"movie\", \"navigation\", \"nav\", \"search_bar\", \"setting\", \"settings\", \"text\", \"label\", \"image\", \"poster\", \"banner\", or \"carousel\".\n\nMap ambiguous UI elements to the closest allowed type:\n\n* card, movie, poster, banner, recommendation, content, carousel -> \"tile\"\n* app, application -> \"app_icon\"\n* navigation, nav -> \"tab\"\n* search, search_bar, search_box -> \"input\"\n* setting, settings -> \"icon\"\n* text, label, image -> \"other\"\n* if unsure -> \"other\"\n\nReturn raw JSON only.\nDo not explain.\nDo not use markdown.\nDo not include comments.\nDo not include trailing commas.\n\nUse this schema:\n{{\n  \"elements\": [\n    {{\n      \"text\": \"...\",\n      \"type\": \"tab\",\n      \"focused\": true\n    }}\n  ]\n}}\n"
  lm_loss_weight: 1.0
  dbild_loss_weight: 0.5
  vsd_loss_weight: 0.5
  kd_temperature: 2.0
  dbild_top_k: 64
  dbild_min_prob: 0.0
  teacher_logits_field: teacher_logits
  switch_logits_field: switch_logits
  use_cached_logits: true
  student_vision_path: model.visual
  student_projector_path: __identity__
  teacher_lm_path: model.language_model
  teacher_token_embedding_path: model.language_model.embed_tokens
  teacher_lm_head_path: lm_head
  switch_cache_student_visual: true
  student_visual_cache_dir: outputs/switch-kd/student_visual_cache
  keep_student_visual_cache_on_cpu: true
  visual_token_placeholder: <|image_pad|>
  max_cached_logits_vocab: 4096
  align_kd_logits_to_answer: true
  skip_kd_on_vocab_mismatch: false
evaluation:
  output_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/eval_report.json
  metrics:
  - exact_match
  - token_f1
