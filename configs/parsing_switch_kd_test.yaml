seed: 42

data:
  manifest_path: outputs/test/labels/test_manifest_real.jsonl
  distill_path: outputs/test/labels/test_switch_kd_dataset_real.jsonl
  label_path: outputs/test/labels/test_teacher_labels_real.jsonl
  teacher_logits_path: outputs/test/labels/test_teacher_logits_real.jsonl
  switch_logits_path: outputs/test/labels/test_switch_logits_real.jsonl
  eval_path: outputs/test/labels/test_switch_kd_dataset_real.jsonl
  image_dir: /home/phison/vlm_distill/test_data
  image_root: .
  max_samples:

teacher:
  backend: hf
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  device_map: cpu
  torch_dtype: float32
  temperature: 0.0
  max_new_tokens: 32
  image_resize: 480p

student:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  output_dir: outputs/test/weights
  adapter_dir: outputs/test/weights/adapter
  use_lora: true
  lora_rank: 4
  lora_alpha: 8
  lora_dropout: 0.0
  quantization: none

training:
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0001
  max_steps: 1
  log_every: 1
  save_every: 1
  mixed_precision: "no"
  gradient_checkpointing: false
  image_resize: 480p
  max_length: 4096
  freeze_vision_tower: true
  mask_prompt_labels: true

distillation:
  method: switch_kd
  confidence_weighting: true
  min_teacher_confidence: 0.0
  prompt_template: |
    You are an Android TV GUI parsing assistant.

    Task:
    {query}

    Identify all visible interactive UI elements in this screenshot.

    Interactive elements include:

    * tabs
    * buttons
    * app icons
    * app tiles
    * menu items
    * carousel tiles
    * focused or highlighted items
    * toggles or switches
    * search boxes or text inputs
    * clickable text links
    * settings, account, search, or navigation icons

    Exclude:

    * movie descriptions
    * recommendation summaries
    * long informational text
    * advertisements
    * decorative or non-interactive text

    Rules:

    * Prefer recall over brevity.
    * Do not return only the top navigation bar.
    * Include every visible app icon, tile, card, tab, button, menu item, and focused item.
    * If there are multiple rows or carousels, inspect all visible rows.
    * Mark the focused or highlighted element with `"focused": true`.
    * Use `"focused": false` for all other elements.
    * If the text is unreadable but the element is clearly interactive, use a short visual name.
    * Each element must be an object with exactly these fields: `"text"`, `"type"`, and `"focused"`.

    The `"type"` field is a closed enum.
    For every element, `"type"` MUST be exactly one of:
    ["tab", "button", "app_icon", "app_tile", "menu_item", "tile", "toggle", "input", "icon", "link", "other", "unknown"]

    Do not invent new type names.
    Do not output values such as:
    "card", "movie", "navigation", "nav", "search_bar", "setting", "settings", "text", "label", "image", "poster", "banner", or "carousel".

    Map ambiguous UI elements to the closest allowed type:

    * card, movie, poster, banner, recommendation, content, carousel -> "tile"
    * app, application -> "app_icon"
    * navigation, nav -> "tab"
    * search, search_bar, search_box -> "input"
    * setting, settings -> "icon"
    * text, label, image -> "other"
    * if unsure -> "other"

    Return raw JSON only.
    Do not explain.
    Do not use markdown.
    Do not include comments.
    Do not include trailing commas.

    Use this schema:
    {{
      "elements": [
        {{
          "text": "...",
          "type": "tab",
          "focused": true
        }}
      ]
    }}
  lm_loss_weight: 1.0
  dbild_loss_weight: 0.5
  vsd_loss_weight: 0.5
  kd_temperature: 2.0
  dbild_top_k: 4
  dbild_min_prob: 0.0
  teacher_logits_field: teacher_logits
  switch_logits_field: switch_logits
  use_cached_logits: true
  student_vision_path: model.visual
  teacher_lm_path: model.language_model
  teacher_token_embedding_path: model.language_model.embed_tokens
  teacher_lm_head_path: lm_head
  visual_token_placeholder: "<|image_pad|>"
  max_cached_logits_vocab: 16
  align_kd_logits_to_answer: true
  skip_kd_on_vocab_mismatch: true
  switch_kd:
    enabled: true
    visual_switch:
      mode: paper
      teacher_projector: native
      allow_fallback_adapter: false

evaluation:
  output_path: outputs/test/weights/eval_report.json
  metrics:
    - exact_match
    - token_f1
