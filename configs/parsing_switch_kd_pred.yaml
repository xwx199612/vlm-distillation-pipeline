seed: 42

options:
  task_name: parsing
  quality: 1080p
  teacher_quantization: 8bit
  student_quantization: 4bit
  # Derived automatically:
  # label_profile = {quality}_{teacher_quantization}
  # response_profile = {quality}_{teacher_quantization}_student_{student_quantization}
data:
  manifest_path: outputs/switch-kd/{task_name}_infer_manifest.jsonl
  distill_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}.jsonl
  label_path: outputs/switch-kd/{task_name}_teacher_labels_{label_profile}.jsonl
  prediction_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/student_predictions.jsonl
  eval_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/student_eval_report.json
  image_dir: /home/phison/vlm_distill/validation_data
  image_root: .
  max_samples:

teacher:
  backend: hf
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: float16
  quantization: "{teacher_quantization}"
  temperature: 0.0
  max_new_tokens: 512
  image_resize: "{quality}"

student:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  output_dir: outputs/switch-kd/{task_name}_switch_kd_{response_profile}
  adapter_dir: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/adapter
  inference_adapter_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/adapter
  # Optional. Leave empty to load from model_name.
  # Use this only if you already saved a merged full model somewhere.
  inference_model_path:

  device_map: auto
  quantization: "{student_quantization}"
  attn_implementation: sdpa

  # Prediction adapter controls:
  load_adapter: true

  # false = base model + PEFT adapter wrapper
  # true  = merge adapter into base model before generate
  #
  # For 4bit/8bit inference, false is usually safer.
  # For exporting or testing a full merged model, set true and preferably use quantization: none.
  merge_adapter: false

training:
  image_resize: "{quality}"

distillation:
  prompt_template: |
    You are an Android TV GUI parsing assistant.

    Task:
    {query}
    
    Identify all visible interactive UI elements in this screenshot.
    
    Interactive elements include:
    
    * tabs
    * buttons
    * app icons
    * app tiles
    * menu items
    * carousel tiles
    * focused or highlighted items
    * toggles or switches
    * search boxes or text inputs
    * clickable text links
    * settings, account, search, or navigation icons
    
    Exclude:
    
    * movie descriptions
    * recommendation summaries
    * long informational text
    * advertisements
    * decorative or non-interactive text
    
    Rules:
    
    * Prefer recall over brevity.
    * Do not return only the top navigation bar.
    * Include every visible app icon, tile, card, tab, button, menu item, and focused item.
    * If there are multiple rows or carousels, inspect all visible rows.
    * Mark the focused or highlighted element with `"focused": true`.
    * Use `"focused": false` for all other elements.
    * If the text is unreadable but the element is clearly interactive, use a short visual name.
    * Each element must be an object with exactly these fields: `"text"`, `"type"`, and `"focused"`.
    
    The `"type"` field is a closed enum.
    For every element, `"type"` MUST be exactly one of:
    ["tab", "button", "app_icon", "app_tile", "menu_item", "tile", "toggle", "input", "icon", "link", "other", "unknown"]
    
    Do not invent new type names.
    Do not output values such as:
    "card", "movie", "navigation", "nav", "search_bar", "setting", "settings", "text", "label", "image", "poster", "banner", or "carousel".
    
    Map ambiguous UI elements to the closest allowed type:
    
    * card, movie, poster, banner, recommendation, content, carousel -> "tile"
    * app, application -> "app_icon"
    * navigation, nav -> "tab"
    * search, search_bar, search_box -> "input"
    * setting, settings -> "icon"
    * text, label, image -> "other"
    * if unsure -> "other"
    
    Return raw JSON only.
    Do not explain.
    Do not use markdown.
    Do not include comments.
    Do not include trailing commas.
    
    Use this schema:
    {{
    "elements": [
    {{
    "text": "...",
    "type": "tab",
    "focused": true
    }}
    ]
    }}

evaluation:
  output_path: outputs/switch-kd/{task_name}_switch_kd_{response_profile}/student_eval_report.json
  metrics:
    - exact_match
    - token_f1
