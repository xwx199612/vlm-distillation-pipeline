seed: 42

data:
  manifest_path: examples/screen_parsing_manifest.jsonl
  distill_path: outputs/screen_parsing_distill_dataset.jsonl
  eval_path: outputs/screen_parsing_distill_dataset.jsonl
  image_root: .
  max_samples: 3

teacher:
  backend: hf
  model_name: D:/Models/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: float16
  quantization: 4bit
  temperature: 0.0
  max_new_tokens: 256

student:
  model_name: mock-vlm-student
  output_dir: outputs/screen_parsing_student
  adapter_dir: outputs/screen_parsing_student/adapter
  use_lora: true
  quantization: none

training:
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  max_steps: 4
  log_every: 1
  save_every: 50
  mixed_precision: "no"

distillation:
  target_field: student_target
  prompt_template: |
    You are a GUI screen parsing assistant.

    Analyze this device screenshot and list all visible UI icons, buttons, menu items, and actionable elements.

    Instruction: {instruction}

    Return only valid JSON:
    {{
      "screen_type": "",
      "elements": [
        {{"label": "", "type": "icon|button|menu_item|text|toggle|input|unknown"}}
      ]
    }}

evaluation:
  output_path: outputs/screen_parsing_eval_report.json
  metrics:
    - valid_json_rate
    - element_f1