seed: 42

data:
  image_dir: D:/TV_data/test_data
  output_dir: D:/TV_data/teacher_parsing
  manifest_path: D:/TV_data/teacher_parsing/screen_parsing_manifest.jsonl
  distill_path: D:/TV_data/teacher_parsing/screen_parsing_teacher_labels.jsonl
  eval_path: D:/TV_data/teacher_parsing/screen_parsing_teacher_labels.jsonl
  image_root: .
  max_samples: 3

teacher:
  backend: hf
  model_name: D:/Models/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: float16
  quantization: 4bit
  temperature: 0.0
  max_new_tokens: 1024

student:
  model_name: mock-vlm-student
  output_dir: outputs/screen_parsing_student
  adapter_dir: outputs/screen_parsing_student/adapter
  use_lora: true
  quantization: none

training:
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  max_steps: 4
  log_every: 1
  save_every: 50
  mixed_precision: "no"

distillation:
  target_field: student_target
  prompt_template: |
    You are an Android TV GUI automation assistant.

    Analyze this screenshot for remote-control navigation.

    Android TV screens may have hierarchical focus.

    Example:
    - A top navigation tab such as Search, Home, Shop, Discover, or Apps may be selected.
    - Inside the selected tab, a content item such as YouTube or Netflix may also be focused.
    - If both exist, the content item is the element activated by OK / Enter, while the top tab is the active navigation context.

    Identify:
    1. The active navigation area.
    2. The active top-level tab if visible.
    3. The currently focused actionable element.
    4. All selectable UI elements visible on the screen.

    Focus rule:
    - focused_element means the item that would be activated if the user presses OK / Enter now.
    - active_top_tab means the selected top navigation tab, such as Home or Apps.
    - If only the top tab is selected and no content item is focused, focused_element should be the top tab.
    - If a content item is focused under a selected tab, focused_element should be the content item and active_top_tab should still record the selected tab.

    Focus indicators may include:
    - bright border
    - colored outline
    - glow effect
    - enlarged tile
    - highlighted background
    - selected tab underline
    - selection rectangle

    Ignore:
    - movie descriptions
    - recommendation text
    - advertisement text
    - long informational content

    Return raw JSON only.
    Do not explain.
    Do not use markdown.

    JSON schema:
    {{
      "active_navigation_area": "",
      "active_top_tab": "",
      "focused_element": "",
      "focus_state": "",
      "selectable_elements": []
    }}

evaluation:
  output_path: outputs/screen_parsing_eval_report.json
  metrics:
    - valid_json_rate
    - element_f1